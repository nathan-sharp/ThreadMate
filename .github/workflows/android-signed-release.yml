name: Android Signed Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore ThreadMate/ThreadMate.csproj

      - name: Materialize keystore from secret
        shell: pwsh
        run: |
          $keystorePath = Join-Path $env:RUNNER_TEMP "threadmate.keystore"
          [IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_BASE64 }}"))
          "KEYSTORE_PATH=$keystorePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish signed AAB
        shell: pwsh
        run: |
          dotnet publish ThreadMate/ThreadMate.csproj `
            -f net10.0-android `
            -c Release `
            -p:AndroidPackageFormat=aab `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyStore="$env:KEYSTORE_PATH" `
            -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" `
            -p:AndroidSigningStorePass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" `
            -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: threadmate-signed-aab
          path: ThreadMate/bin/Release/net10.0-android/**/*.aab